
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ENSPD IA PIZZA 🍕</title>
<style>
    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: linear-gradient(135deg, #ff5f6d, #ffc371);
        margin: 0; padding: 0;
        display: flex; justify-content: center; align-items: center;
        min-height: 100vh;
    }
    .container {
        background: white;
        border-radius: 16px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        width: 95%; max-width: 700px;
        padding: 20px;
        display: flex; flex-direction: column;
        height: 90vh;
    }
    h1 { text-align: center; color: #d6336c; margin-bottom: 5px; }
    .subtitle { text-align: center; color: #888; margin-bottom: 15px; font-size: 14px; }
    #chat {
        flex: 1; overflow-y: auto; border: 1px solid #eee;
        border-radius: 10px; padding: 15px; background: #fafafa; margin-bottom: 15px;
    }
    .msg { margin: 8px 0; padding: 10px 14px; border-radius: 14px; max-width: 80%; line-height: 1.4; }
    .user { background: #d6336c; color: white; margin-left: auto; text-align: right; }
    .bot { background: #ffe3e3; color: #333; margin-right: auto; }
    .controls { display: flex; gap: 8px; }
    #textInput {
        flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 15px;
    }
    button {
        border: none; border-radius: 10px; padding: 12px 18px; cursor: pointer;
        font-size: 15px; font-weight: bold; transition: 0.2s;
    }
    #sendBtn { background: #d6336c; color: white; }
    #sendBtn:hover { background: #b02a55; }
    #micBtn { background: #ffd43b; color: #333; }
    #micBtn.listening { background: #fa5252; color: white; animation: pulse 1s infinite; }
    @keyframes pulse { 0%{transform:scale(1);} 50%{transform:scale(1.15);} 100%{transform:scale(1);} }
    #cart {
        margin-top: 15px; border-top: 2px dashed #ffc371; padding-top: 10px; font-size: 14px;
    }
    #cart h3 { margin: 0 0 8px 0; color: #d6336c; }
    .cart-item { display:flex; justify-content: space-between; padding: 4px 0; }
    .total { font-weight: bold; font-size: 16px; margin-top: 8px; text-align: right; color:#d6336c; }
</style>
</head>
<body>
<div class="container">
    <h1>🍕 ENSPD IA PIZZA</h1>
    <div class="subtitle">Commandez par texte ou par voix (clic sur le micro 🎤)</div>

    <div id="chat">
        <div class="msg bot">Bonjour ! Je suis l'assistant ENSPD IA PIZZA. Que souhaitez-vous commander ?</div>
    </div>

    <div class="controls">
        <input type="text" id="textInput" placeholder="Tapez votre message... (ex: Je veux une grande margherita)">
        <button id="micBtn">🎤</button>
        <button id="sendBtn">Envoyer</button>
    </div>

    <div id="cart">
        <h3>🛒 Panier</h3>
        <div id="cartItems"><em>Panier vide</em></div>
        <div class="total" id="cartTotal"></div>
    </div>
</div>

<script>
const sessionId = "user_" + Math.random().toString(36).substring(2, 10);
const chat = document.getElementById("chat");
const textInput = document.getElementById("textInput");
const sendBtn = document.getElementById("sendBtn");
const micBtn = document.getElementById("micBtn");
const cartItems = document.getElementById("cartItems");
const cartTotal = document.getElementById("cartTotal");

function addMessage(text, sender) {
    const div = document.createElement("div");
    div.className = "msg " + sender;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function updateCart(panier, total) {
    if (!panier || panier.length === 0) {
        cartItems.innerHTML = "<em>Panier vide</em>";
        cartTotal.textContent = "";
        return;
    }
    cartItems.innerHTML = "";
    panier.forEach(item => {
        const div = document.createElement("div");
        div.className = "cart-item";
        let extras = (item.extras && item.extras.length) ? " + " + item.extras.join(", ") : "";
        div.innerHTML = `<span>${item.quantite} x ${item.pizza} (${item.taille})${extras}</span><span>${item.prix} FCFA</span>`;
        cartItems.appendChild(div);
    });
    if (total !== undefined) {
        cartTotal.textContent = "Total : " + total + " FCFA";
    }
}

async function sendMessage(text) {
    if (!text.trim()) return;
    addMessage(text, "user");
    textInput.value = "";

    try {
        const response = await fetch("/order", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session_id: sessionId, text: text })
        });
        const data = await response.json();
        addMessage(data.message, "bot");

        // Récupérer l'état du panier à jour
        const cartResp = await fetch("/cart/" + sessionId);
        const cartData = await cartResp.json();
        updateCart(cartData.panier, cartData.total);

    } catch (err) {
        addMessage("Erreur de connexion à l'API : " + err, "bot");
    }
}

sendBtn.addEventListener("click", () => sendMessage(textInput.value));
textInput.addEventListener("keypress", (e) => {
    if (e.key === "Enter") sendMessage(textInput.value);
});

// ---- Reconnaissance vocale (Web Speech API) ----
let recognition;
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.lang = "fr-FR";
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => micBtn.classList.add("listening");
    recognition.onend = () => micBtn.classList.remove("listening");

    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        textInput.value = transcript;
        sendMessage(transcript);
    };

    recognition.onerror = (event) => {
        addMessage("Erreur de reconnaissance vocale : " + event.error, "bot");
    };

    micBtn.addEventListener("click", () => {
        recognition.start();
    });
} else {
    micBtn.disabled = true;
    micBtn.title = "Non supporté par ce navigateur";
}
</script>
</body>
</html>
